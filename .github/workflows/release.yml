name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and package (in toolchain container)
        run: ./scripts/docker-build.sh --target package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "emu68 Driver Stack ${{ github.ref_name }}"
          files: build/package/emu68-drivers-*.lha
          generate_release_notes: true
