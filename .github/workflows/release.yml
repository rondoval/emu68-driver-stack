name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build and package - off (production) backend
        run: ./scripts/docker-build.sh --target package
        env:
          EMU68_BUILD_DIR: build-off
          EMU68_INSTALL_DIR: install-off
          # See build.yml: released Emu68 doesn't carry the private opcode
          # that cache_ops.h's inline fast path needs; force the LVO route.
          EMU68_CONFIGURE_ARGS: "-DEMU68_DEBUG_BACKEND=off -DEMU68_FORCE_LVO_CACHE_OPS=ON"

      - name: Build and package - serial (debug) backend
        run: ./scripts/docker-build.sh --target package
        env:
          EMU68_BUILD_DIR: build-serial
          EMU68_INSTALL_DIR: install-serial
          EMU68_CONFIGURE_ARGS: "-DEMU68_DEBUG_BACKEND=serial -DEMU68_FORCE_LVO_CACHE_OPS=ON"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "emu68 Driver Stack ${{ github.ref_name }}"
          files: |
            build-off/package/emu68-drivers-*.lha
            build-serial/package/emu68-drivers-*.lha
          # Component versions (identical for both variants) prepended to the
          # auto-generated commit/PR notes.
          body_path: build-off/installer/VERSIONS.txt
          generate_release_notes: true
