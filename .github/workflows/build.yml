name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        backend: ["off", "serial"]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build ${{ matrix.backend }} backend (in toolchain container)
        run: ./scripts/docker-build.sh
        env:
          EMU68_INSTALL_DIR: install-${{ matrix.backend }}
          EMU68_CONFIGURE_ARGS: "-DEMU68_DEBUG_BACKEND=${{ matrix.backend }}"

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emu68-drivers-${{ matrix.backend }}
          path: |
            install-${{ matrix.backend }}/LIBS
            install-${{ matrix.backend }}/DEVS
            install-${{ matrix.backend }}/C
          if-no-files-found: error
